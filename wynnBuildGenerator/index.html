<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WynnBuilder Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary mb-3">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">WynnBuilder Generator</span>
    <a href="../builder/" class="btn btn-sm btn-outline-light">Builder に戻る</a>
  </div>
</nav>

<div class="container-fluid">
  <div class="row g-3">

    <!-- Search Form -->
    <div class="col-lg-4">
      <div class="card bg-secondary bg-opacity-10 border-secondary">
        <div class="card-header text-light fw-bold">検索設定</div>
        <div class="card-body">

          <!-- Class & Level -->
          <div class="row mb-3">
            <div class="col">
              <label class="form-label small">クラス</label>
              <select id="inp-class" class="form-select form-select-sm bg-dark text-light border-secondary">
                <option value="warrior">Warrior</option>
                <option value="fallen">Fallen (Warrior)</option>
                <option value="archer">Archer</option>
                <option value="skyseer">Skyseer (Archer)</option>
                <option value="mage">Mage</option>
                <option value="darkwizard">Dark Wizard (Mage)</option>
                <option value="assassin">Assassin</option>
                <option value="ninja">Ninja (Assassin)</option>
                <option value="shaman">Shaman</option>
                <option value="ritualist">Ritualist (Shaman)</option>
              </select>
            </div>
            <div class="col">
              <label class="form-label small">レベル</label>
              <input id="inp-level" type="number" class="form-control form-control-sm bg-dark text-light border-secondary"
                     value="106" min="1" max="106" />
            </div>
          </div>

          <!-- Scoring -->
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label small mb-0">スコア設定</label>
              <div>
                <button class="btn btn-sm btn-outline-success me-1" onclick="addScoringRow('maximize')">+ Maximize</button>
                <button class="btn btn-sm btn-outline-warning" onclick="addScoringRow('minimize')">+ Minimize</button>
              </div>
            </div>
            <div id="scoring-rows"></div>
          </div>

          <!-- Conditions -->
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label small mb-0">条件</label>
              <button class="btn btn-sm btn-outline-info" onclick="addConditionRow()">+ 条件追加</button>
            </div>
            <div id="condition-rows"></div>
          </div>

          <!-- Fixed Items -->
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label small mb-0">固定アイテム</label>
              <button class="btn btn-sm btn-outline-secondary" onclick="addFixedRow()">+ 固定追加</button>
            </div>
            <div id="fixed-rows"></div>
          </div>

          <!-- Search Params -->
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label small mb-0">探索パラメータ</label>
              <button class="btn btn-xs btn-link text-secondary small p-0" type="button"
                      data-bs-toggle="collapse" data-bs-target="#params-collapse">詳細</button>
            </div>
            <div class="collapse" id="params-collapse">
              <div class="row g-2">
                <div class="col-4">
                  <label class="form-label small mb-1">Beam Width</label>
                  <input id="param-beam" type="number" class="form-control form-control-sm bg-dark text-light border-secondary"
                         value="50" min="1" />
                </div>
                <div class="col-4">
                  <label class="form-label small mb-1">Max/Slot</label>
                  <input id="param-maxslot" type="number" class="form-control form-control-sm bg-dark text-light border-secondary"
                         value="40" min="1" />
                </div>
                <div class="col-4">
                  <label class="form-label small mb-1">Results</label>
                  <input id="param-results" type="number" class="form-control form-control-sm bg-dark text-light border-secondary"
                         value="10" min="1" max="50" />
                </div>
              </div>
            </div>
          </div>

          <button id="btn-search" class="btn btn-primary w-100" onclick="runSearch()">
            検索
          </button>

        </div>
      </div>
    </div>

    <!-- Results -->
    <div class="col-lg-8">
      <div id="status-bar" class="alert alert-secondary py-2 small mb-3 d-none"></div>

      <div id="results-container">
        <div class="text-center text-secondary mt-5">
          <p>クラスとレベルを設定して検索してください。</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
